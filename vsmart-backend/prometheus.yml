# prometheus.yml

global:
  scrape_interval: 15s
scrape_configs:
  - job_name: 'otel-collector'
    static_configs:
      - targets: ['otel-collector:8889']

  # Job 2: Scrapes the metrics exposed directly by the FastAPI app
  - job_name: 'vsmart-backend'
    static_configs:
      - targets: ['backend:8000'] # 'backend' is the service name from docker-compose
    scrape_interval: 60s

rule_files:
  - /etc/prometheus/prometheus-rules.yml
